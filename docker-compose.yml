version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: clipper-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: clipper_secret_2024
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - clipper-network

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: clipper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clipper-network

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipper-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:clipper_secret_2024@mongo:27017/clipper?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STORAGE_PATH: /app/storage
    depends_on:
      - mongo
      - redis
    volumes:
      - storage_data:/app/storage
    networks:
      - clipper-network

  # Worker - Download & Process
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: clipper-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:clipper_secret_2024@mongo:27017/clipper?authSource=admin
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STORAGE_PATH: /app/storage
    depends_on:
      - mongo
      - redis
    volumes:
      - storage_data:/app/storage
    networks:
      - clipper-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clipper-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - clipper-network

volumes:
  mongo_data:
  redis_data:
  storage_data:

networks:
  clipper-network:
    driver: bridge
