worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ─── Performance ─────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain text/css application/json application/javascript
                     text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length    1024;

  # ─── Upload Size ─────────────────────────────────────────────────────────────
  client_max_body_size 512m;
  client_body_timeout  300s;
  proxy_read_timeout   300s;
  proxy_send_timeout   300s;

  # ─── Rate Limit Zones ────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_general:10m    rate=60r/m;
  limit_req_zone $binary_remote_addr zone=api_auth:10m       rate=20r/m;
  limit_req_zone $binary_remote_addr zone=api_upload:10m     rate=10r/m;

  # ─── Upstreams ────────────────────────────────────────────────────────────────
  upstream api_backend {
    server api:5000;
    keepalive 32;
  }

  upstream frontend_next {
    server frontend:3000;
    keepalive 16;
  }

  # ─── Main Server ─────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"               always;
    add_header X-Content-Type-Options    "nosniff"                  always;
    add_header X-XSS-Protection          "1; mode=block"            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ─── Auth endpoints (strict rate limit) ──────────────────────────────────
    location /api/auth/ {
      limit_req zone=api_auth burst=10 nodelay;
      limit_req_status 429;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ─── Upload endpoint (larger body, slower rate) ───────────────────────────
    location /api/videos/upload {
      limit_req zone=api_upload burst=3 nodelay;

      proxy_pass            http://api_backend;
      proxy_http_version    1.1;
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      Connection        "";
      proxy_request_buffering off;
      proxy_buffering         off;
    }

    # ─── General API ─────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_general burst=30 nodelay;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ─── WebSocket (Socket.IO) ────────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass          http://api_backend;
      proxy_http_version  1.1;
      proxy_set_header    Upgrade    $http_upgrade;
      proxy_set_header    Connection "upgrade";
      proxy_set_header    Host       $host;
      proxy_set_header    X-Real-IP  $remote_addr;
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
    }

    # ─── Storage / Media Files ────────────────────────────────────────────────
    location /storage/ {
      proxy_pass          http://api_backend/storage/;
      proxy_http_version  1.1;
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_cache_bypass  $http_pragma;
      add_header          Cache-Control "public, max-age=604800, immutable";
      add_header          Access-Control-Allow-Origin "*";
    }

    # ─── Next.js Frontend ────────────────────────────────────────────────────
    location /_next/static/ {
      proxy_pass       http://frontend_next;
      add_header       Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      proxy_pass         http://frontend_next;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Health Check ────────────────────────────────────────────────────────
    location /nginx-health {
      access_log off;
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
  }
}
