# Docker Compose for Raspberry Pi ARM64
# Optimized to avoid exit code 159 build errors
# Uses ytdl-core (npm) instead of yt-dlp (python)

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: clipper-mongo
    restart: unless-stopped
    platform: linux/arm64
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: clipper_secret_2024
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - clipper-network

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: clipper-redis
    restart: unless-stopped
    platform: linux/arm64
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clipper-network

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipper-api
    restart: unless-stopped
    platform: linux/arm64
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:clipper_secret_2024@mongo:27017/clipper?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: your-refresh-token-secret-key-change-in-production
      JWT_REFRESH_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
      - storage_data:/app/storage
    networks:
      - clipper-network

  # Worker - Raspberry Pi Optimized
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.raspi  # Use Raspberry Pi optimized Dockerfile
    container_name: clipper-worker
    restart: unless-stopped
    platform: linux/arm64
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:clipper_secret_2024@mongo:27017/clipper?authSource=admin
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Use ytdl-core instead of yt-dlp
      USE_YTDL_CORE: "true"
    depends_on:
      - mongo
      - redis
    volumes:
      - ./worker:/app
      - /app/node_modules
      - storage_data:/app/storage
    networks:
      - clipper-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clipper-frontend
    restart: unless-stopped
    platform: linux/arm64
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - clipper-network

volumes:
  mongo_data:
  redis_data:
  storage_data:

networks:
  clipper-network:
    driver: bridge
